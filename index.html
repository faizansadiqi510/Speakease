<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakEase — Speak clearly. Win globally.</title>
    <!-- Beautiful, high-compatibility inline SVG Favicon matching the official Speakease concentric circle logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='28' fill='%23121212'/%3E%3Ccircle cx='50' cy='50' r='26' stroke='%2338424d' stroke-width='2' fill='none'/%3E%3Ccircle cx='50' cy='50' r='17' stroke='%234c5866' stroke-width='2' fill='none'/%3E%3Ccircle cx='50' cy='50' r='7.5' fill='%238fa3b5'/%3E%3C/svg%3E" />
    <script>
      // Gracefully capture and suppress read-only global fetch assignment errors 
      // sometimes triggered by sandbox environments or browser extensions.
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.indexOf("Cannot set property 'fetch'") !== -1 ||
          event.message.indexOf("Cannot set property fetch") !== -1 ||
          event.message.indexOf("only a getter") !== -1
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn("Caught and suppressed global fetch override error:", event.message);
        }
      }, true);

      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && (
          event.reason.message.indexOf("Cannot set property 'fetch'") !== -1 ||
          event.reason.message.indexOf("Cannot set property fetch") !== -1 ||
          event.reason.message.indexOf("only a getter") !== -1
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn("Caught and suppressed global fetch override rejection:", event.reason.message);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
